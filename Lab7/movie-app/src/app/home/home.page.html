<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Shrek App
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

 <!-- Loop to move through movies array and display details -->
 @for(movie of movies; track movie){
  <ion-card>
    <img alt="Image of Movie" src="{{movie.Poster}}">
  <ion-card-header>
    <ion-card-title>{{movie.Title}}</ion-card-title>
    <ion-card-subtitle>{{movie.Year}}</ion-card-subtitle>
  </ion-card-header>
</ion-card>
 }
