<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Provinces of Ireland
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title>Provinces of Ireland</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <ul>
      <!-- Router link so when the word is clicked it changes url -->
      <li [routerLink]="['/ulster']">Ulster</li>
      <li [routerLink]="['/munster']">Munster</li>
      <li [routerLink]="['/leinster']">Leinster</li>
      <li [routerLink]="['/connacht']">Connacht</li>
    </ul>
  </div>
</ion-content>
