<ion-header [translucent]="true">
  <ion-toolbar>
  <ion-buttons slot="start">
     <ion-back-button></ion-back-button>
    </ion-buttons>
    <title>Leinster counties</title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">leinstercounties</ion-title>
    </ion-toolbar>
  </ion-header>

  <hr>
  <ul>
    @for(county of counties;track county){
      <li>{{county}}</li>
    }
  </ul>
</ion-content>
